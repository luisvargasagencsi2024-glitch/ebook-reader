services:
  - type: web
    name: ebook-reader
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm --prefix backend install && npm run build && npm --prefix backend run build
    startCommand: cd backend && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 22
      - key: MONGODB_MEMORY_SERVER_SKIP_POSTINSTALL
        value: "true"
